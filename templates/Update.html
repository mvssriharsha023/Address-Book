<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
</head>
<body style="background-color: whitesmoke;">
    <nav class="navbar bg-body-tertiary">
        <div class="container-fluid">
          <a class="navbar-brand">ADDRESS BOOK</a>
          <form class="d-flex" role="search">
            <a type="button" class="btn btn-outline-primary" href="{{ url_for('logout') }}"> Logout</a>
          </form>
        </div>
      </nav><br><br>
    <div class="container">
        <h3><b>UPDATE INFORMATION</b></h3>
    </div><br>
    
    <div class="container">
        <form class="row g-3" method="post">
            <input type="text" readonly class="form-control" id="username" name="username" value="{{ session.username }}"></input>
            <div class="col-md-12">
              <label for="Name" class="form-label">Name</label>
              <input
                type="text"
                class="form-control"
                id="Name"
                name="Name"
                value="{{data[0]['name']}}"
                readonly
              />
            </div>
            <div class="col-md-3">
              <label for="email_id" class="form-label">Email Id</label>
              <input
                type="text"
                class="form-control"
                id="email_id"
                name="email_id"
                value="{{data[0]['email_id']}}"
              />
            </div>
            <div class="col-md-3">
              <label for="phone_number" class="form-label">Phone Number</label>
              <input
                type="text"
                class="form-control"
                id="phone_number"
                name="phone_number"
                value="{{data[0]['ph_number']}}"
              />
            </div>
            <div class="col-md-3">
                <label for="address" class="form-label">Address</label>
                <input
                  type="text"
                  class="form-control"
                  id="address"
                  name="address"
                  value="{{data[0]['address']}}"
                />
              </div>
            <div class="col-12">
              <button class="btn btn-outline-primary" type="submit">
                Update
              </button>
            </div>
          </form>
    </div>
</body>
</html>
